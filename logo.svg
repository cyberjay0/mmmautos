<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Mask to create clean transparent cutouts for wheels and side-detailing slashes -->
    <mask id="car-silhouette-mask">
      <!-- Everything white stays visible -->
      <rect x="0" y="0" width="200" height="200" fill="#FFFFFF" />
      
      <!-- Black shapes will cut out transparent holes in the car body -->
      <!-- Rear Wheel Arch Cutout -->
      <circle cx="58" cy="112" r="14" fill="#000000" />
      <!-- Front Wheel Arch Cutout -->
      <circle cx="146" cy="112" r="14" fill="#000000" />
      
      <!-- Side Vent / Contour Line Cutouts -->
      <path d="M 52 110 C 62 109, 78 116, 92 116 L 126 116 C 114 114, 100 110, 88 110 Z" fill="#000000" />
      <path d="M 80 102 L 140 106 C 130 105, 115 101, 98 101 Z" fill="#000000" />
      <path d="M 120 94 L 144 98 C 138 97, 130 95, 122 95 Z" fill="#000000" />
    </mask>

    <style>
      .logo-circle-path {
        fill: none;
        stroke: #102B4C;
        stroke-width: 4.5;
        stroke-linecap: round;
      }
      .logo-star {
        fill: #C52026;
      }
      .logo-car-body {
        fill: #C52026;
      }
      .logo-text-title {
        font-family: 'Outfit', 'Arial Narrow', 'Arial Black', sans-serif;
        font-weight: 800;
        font-size: 19.5px;
        fill: #102B4C;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }
      .logo-text-cursive {
        font-family: 'Satisfy', 'Dancing Script', 'Brush Script MT', cursive;
        font-size: 21px;
        fill: #C52026;
      }
    </style>
  </defs>

  <!-- Background circle arcs -->
  <!-- Top Arc (starts left, arches over to right) -->
  <path d="M 41 84 A 66 66 0 0 1 159 84" class="logo-circle-path" />
  <!-- Bottom Arc (starts left, arches under to right) -->
  <path d="M 47 136 A 66 66 0 0 0 153 136" class="logo-circle-path" />

  <!-- Five Arched Red Stars -->
  <!-- Far Left Star -->
  <path d="M 60 72 L 61.5 76.5 L 66 77 L 62.5 80 L 63.5 84.5 L 60 82.5 L 56.5 84.5 L 57.5 80 L 54 77 L 58.5 76.5 Z" class="logo-star" />
  <!-- Mid Left Star -->
  <path d="M 77 60 L 79 65 L 84 65.5 L 80.5 69 L 81.5 74 L 77 71.5 L 72.5 74 L 73.5 69 L 70 65.5 L 75 65 Z" class="logo-star" transform="scale(1.1) translate(-7, -5)" />
  <!-- Center Star (Largest) -->
  <path d="M 100 48 L 102.5 54 L 108.5 54.5 L 104 59 L 105.5 65.5 L 100 62.5 L 94.5 65.5 L 96 59 L 91.5 54.5 L 97.5 54 Z" class="logo-star" transform="scale(1.2) translate(-17, -8)" />
  <!-- Mid Right Star -->
  <path d="M 123 60 L 125 65 L 130 65.5 L 126.5 69 L 127.5 74 L 123 71.5 L 118.5 74 L 119.5 69 L 116 65.5 L 121 65 Z" class="logo-star" transform="scale(1.1) translate(1, -5)" />
  <!-- Far Right Star -->
  <path d="M 140 72 L 141.5 76.5 L 146 77 L 142.5 80 L 143.5 84.5 L 140 82.5 L 136.5 84.5 L 137.5 80 L 134 77 L 138.5 76.5 Z" class="logo-star" />

  <!-- Sports Car Silhouette with integrated mask -->
  <path d="M 33 93 
           C 33 93, 44 87, 60 86 
           C 74 85, 96 85, 114 87 
           C 134 89, 158 96, 172 101 
           C 181 104, 189 108, 191 113
           C 192 114, 190 116, 187 116
           C 183 116, 172 116, 168 116
           C 168 116, 166 112, 160 112
           L 132 112
           C 126 112, 124 116, 124 116
           L 78 116
           C 78 116, 76 112, 70 112
           L 46 112
           C 42 112, 40 116, 40 116
           L 37 116
           C 34 116, 33 113, 33 108
           C 33 103, 33 95, 33 93 Z" 
        class="logo-car-body" 
        mask="url(#car-silhouette-mask)" />

  <!-- Brand Typography -->
  <!-- "MMM AUTOS" Title -->
  <text x="100" y="146" class="logo-text-title" text-anchor="middle">MMM Autos</text>
  
  <!-- "Ltd" Cursive text -->
  <text x="100" y="169" class="logo-text-cursive" text-anchor="middle">Ltd</text>
</svg>
